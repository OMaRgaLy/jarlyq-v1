version: '3.9'

services:
  db:
    image: postgres:15-alpine
    container_name: jarlyq-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: jarlyq
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
    container_name: jarlyq-backend
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ../.env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      HTTP_PORT: ${HTTP_PORT:-8080}
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ../frontend
    container_name: jarlyq-frontend
    depends_on:
      - backend
    env_file:
      - ../.env
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080/api/v1}
    ports:
      - "3000:3000"
    command: npm run start

  nginx:
    image: nginx:1.27-alpine
    container_name: jarlyq-nginx
    depends_on:
      - frontend
      - backend
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"

volumes:
  db-data:
